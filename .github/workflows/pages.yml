name: Deploy Static Backlog Page

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static site artifact
        run: |
          mkdir -p dist
          cp index.html \
            dashboard-app.js \
            dashboard-chart-core.js \
            dashboard-charts-product.js \
            dashboard-styles.css \
            dashboard-view-utils.js \
            agentation-local-loader.js \
            backlog-snapshot.json \
            contributors-snapshot.json \
            pr-cycle-snapshot.json \
            product-cycle-snapshot.json \
            dist/
          mkdir -p dist/vendor
          cp vendor/react.production.min.js vendor/react-dom.production.min.js vendor/prop-types.min.js vendor/recharts.umd.js dist/vendor/
          mkdir -p dist/node_modules/@fontsource/inter/files
          cp node_modules/@fontsource/inter/latin-400.css node_modules/@fontsource/inter/latin-500.css node_modules/@fontsource/inter/latin-600.css node_modules/@fontsource/inter/latin-700.css dist/node_modules/@fontsource/inter/
          cp node_modules/@fontsource/inter/files/inter-latin-400-normal.woff node_modules/@fontsource/inter/files/inter-latin-400-normal.woff2 dist/node_modules/@fontsource/inter/files/
          cp node_modules/@fontsource/inter/files/inter-latin-500-normal.woff node_modules/@fontsource/inter/files/inter-latin-500-normal.woff2 dist/node_modules/@fontsource/inter/files/
          cp node_modules/@fontsource/inter/files/inter-latin-600-normal.woff node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2 dist/node_modules/@fontsource/inter/files/
          cp node_modules/@fontsource/inter/files/inter-latin-700-normal.woff node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2 dist/node_modules/@fontsource/inter/files/
          mkdir -p dist/node_modules/@fontsource/ibm-plex-serif/files
          cp node_modules/@fontsource/ibm-plex-serif/latin-500.css node_modules/@fontsource/ibm-plex-serif/latin-600.css node_modules/@fontsource/ibm-plex-serif/latin-700.css dist/node_modules/@fontsource/ibm-plex-serif/
          cp node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-500-normal.woff node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-500-normal.woff2 dist/node_modules/@fontsource/ibm-plex-serif/files/
          cp node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-600-normal.woff node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-600-normal.woff2 dist/node_modules/@fontsource/ibm-plex-serif/files/
          cp node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-700-normal.woff node_modules/@fontsource/ibm-plex-serif/files/ibm-plex-serif-latin-700-normal.woff2 dist/node_modules/@fontsource/ibm-plex-serif/files/
          touch dist/.nojekyll

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; style-src-elem 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>Sprint Flow Timelapse</title>
    <link rel="stylesheet" href="./timelapse.css" />
  </head>
  <body>
    <main class="layout" aria-live="polite">
      <header class="hero">
        <p class="eyebrow">Sprint Flow Viewer</p>
        <h1>Sprint Flow Timelapse</h1>
        <p class="subtitle" id="sprint-label"></p>
      </header>

      <section class="panel" aria-label="Board state">
        <div class="panel-head">
          <h2>Board State</h2>
          <p class="timestamp" id="timestamp-label"></p>
        </div>
        <div id="board" class="board"></div>
      </section>

      <section class="panel" aria-label="Replay controls">
        <h2>Replay Controls</h2>
        <div class="controls-row">
          <button id="prev-btn" class="btn" type="button">Previous</button>
          <button id="play-btn" class="btn btn-primary" type="button">Play</button>
          <button id="next-btn" class="btn" type="button">Next</button>
          <label class="speed-wrap" for="speed-select">
            Speed
            <select id="speed-select">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
          </label>
        </div>

        <div class="slider-wrap">
          <label for="timeline-slider">Timeline</label>
          <input id="timeline-slider" type="range" min="0" max="0" value="0" step="1" />
        </div>
        <p class="hint" id="index-label"></p>
      </section>
    </main>

    <script src="./timelapse.js"></script>
  </body>
</html>
